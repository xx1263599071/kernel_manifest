name: SukiSu Ultra Build Pipeline - Realme GT5 Pro

on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "处理器分支"
        required: true
        default: 'sm8650'
      MANIFEST:
        description: "配置文件"
        required: true
        default: 'gt5pro'
      CPUD:
        description: "处理器代号"
        required: true
        default: 'pineapple'
      ANDROID_VERSION:
        description: "内核安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      KERNEL_NAME:
        description: "内核名称修改(英文)"
        required: true
        default: '-By-SukiSU-Ultra-'
      KERNEL_TIME:
        description: "构建日期 (格式: YYYY-MM-DD HH:MM:SS UTC)"
        required: true
        default: '2025-05-25 00:00:00 UTC'
      SUSFS_ENABLED:
        description: "启用 SUSFS"
        required: true
        type: boolean
        default: true
      enable_kpm:
        description: "启用KPM"
        required: false
        type: boolean
        default: false
      enable_lz4kd:
        description: "启用lz4kd压缩"
        required: false
        type: boolean
        default: false
      enable_sched_ext:
        description: "启用风驰调度器扩展"
        required: false
        type: boolean
        default: false
      BUILD_METHOD:
        type: choice
        description: "编译方式"
        required: true
        default: gki
        options: [gki, perf]

env:
  CCACHE_DIR: /github/workspace/.ccache
  KERNEL_DIR: kernel_workspace/kernel_platform
  ARTIFACT_NAME: SukiSU_Ultra_${{ github.event.inputs.MANIFEST }}_${{ github.event.inputs.CPU }}

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    # ========== 初始化阶段 ==========
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 12288
        temp-reserve-mb: 4096
        remove-dotnet: true
        remove-android: true

    - name: Setup Build Environment
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          python3 python3-pip git-core gnupg flex bison build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip ccache rsync

        pip3 install --user requests pyyaml
        curl -sS https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo && sudo mv ~/repo /usr/local/bin/
        git config --global user.name "SukiSU-Bot"
        git config --global user.email "sukisu-build@users.noreply.github.com"

    # ========== 缓存管理 ==========
    - name: CCache Configuration
      uses: actions/cache@v3
      with:
        path: |
          ~/.ccache
          ${{ env.KERNEL_DIR }}/out
        key: ${{ runner.os }}-ccache-${{ env.ARTIFACT_NAME }}-${{ hashFiles('**/build.config.*') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ env.ARTIFACT_NAME }}-

    # ========== 代码管理 ==========
    - name: Initialize Repo
      run: |
        mkdir -p ${{ env.KERNEL_DIR }}
        cd ${{ env.KERNEL_DIR }}
        repo init -u https://github.com/xx2901318208/SukiSu_Ultra_Action_Build.git \
          -b realme/${{ github.event.inputs.CPU }} \
          -m ${{ github.event.inputs.MANIFEST }}.xml \
          --depth=3 \
          --submodules='KernelSU:SukiSU_patch'

    - name: Sync Repository (with retry)
      run: |
        cd ${{ env.KERNEL_DIR }}
        for i in {1..3}; do
          repo sync -c -j$(nproc) --fail-fast --no-tags && break
          echo "Sync failed (attempt $i), retrying in 30s..."
          sleep 30
          [ $i -eq 3 ] && exit 1
        done

    # ========== 源码预处理 ==========
    - name: Clean Dirty Markers
      run: |
        find ${{ env.KERNEL_DIR }} -name setlocalversion -exec sed -i 's/ -dirty//g' {} +
        sed -i 's/SUBLEVEL = 68/SUBLEVEL = 75/' ${{ env.KERNEL_DIR }}/msm-kernel/Makefile

    # ========== 功能模块集成 ==========
    - name: Integrate BBR v3
      run: |
        cd ${{ env.KERNEL_DIR }}
        git remote add google-bbr https://github.com/google/bbr.git
        git fetch google-bbr v3 --depth=1
        git merge FETCH_HEAD -m "Merge BBR v3" --allow-unrelated-histories

    - name: Setup KernelSU
      run: |
        cd ${{ env.KERNEL_DIR }}
        curl -sS "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-dev
        KSU_VER=$(git -C KernelSU rev-list --count main)
        echo "KSU_VERSION=$((KSU_VER + 10606))" >> $GITHUB_ENV

    # ========== 可选功能模块 ==========
    - name: Apply SUSFS Patches
      if: ${{ github.event.inputs.SUSFS_ENABLED == 'true' }}
      run: |
        cd ${{ env.KERNEL_DIR }}
        git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}
        cp -v susfs4ksu/kernel_patches/50_add_susfs*.patch common/
        patch -p1 -d common < common/50_add_susfs*.patch

    - name: Apply lz4kd Compression
      if: ${{ github.event.inputs.enable_lz4kd == 'true' }}
      run: |
        cd ${{ env.KERNEL_DIR }}/common
        curl -sSLO https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/main/other/zram/zram_patch/${{ github.event.inputs.KERNEL_VERSION }}/lz4kd.patch
        patch -p1 -F3 < lz4kd.patch

    - name: Integrate sched_ext
      if: ${{ github.event.inputs.enable_sched_ext == 'true' }}
      run: |
        cd ${{ env.KERNEL_DIR }}
        git clone --depth=1 https://github.com/HanKuCha/sched_ext.git
        cp -rv sched_ext/* common/kernel/sched/

    # ========== 内核配置 ==========
    - name: Configure Kernel
      run: |
        cd ${{ env.KERNEL_DIR }}/common
        # 基础配置
        echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/gki_defconfig
        
        # SUSFS配置
        ${{ github.event.inputs.SUSFS_ENABLED == 'true' }} && (
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/gki_defconfig
        )
        
        # 性能配置
        echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/gki_defconfig
        echo 'CONFIG_DEFAULT_TCP_CONG="bbr"' >> arch/arm64/configs/gki_defconfig
        
        # 调试配置
        echo "CONFIG_DEBUG_FS=y" >> arch/arm64/configs/gki_defconfig
        echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/gki_defconfig

    # ========== 构建阶段 ==========
    - name: Build Kernel
      run: |
        export SOURCE_DATE_EPOCH=$(date -d "${{ github.event.inputs.KERNEL_TIME }}" +%s)
        cd ${{ env.KERNEL_DIR }}
        ./build_with_bazel.py \
          --jobs $(($(nproc)*2)) \
          -t ${{ github.event.inputs.CPUD }} \
          ${{ github.event.inputs.BUILD_METHOD }}

    # ========== 产物处理 ==========
    - name: Package Artifacts
      run: |
        mkdir -p AnyKernel3
        # 自动定位内核镜像
        find_image() {
          find ${{ env.KERNEL_DIR }} -path '*/arch/arm64/boot/Image' -print -quit
        }
        
        IMAGE_PATH=$(find_image)
        if [ ! -f "$IMAGE_PATH" ]; then
          echo "::error::Kernel image not found!"
          exit 1
        fi
        cp "$IMAGE_PATH" AnyKernel3/

        # 特殊设备处理
        if [ "${{ github.event.inputs.CPU }}" = "sm8750" ]; then
          for img in dtbo.img vendor_boot.img; do
            find ${{ env.KERNEL_DIR }} -name $img -exec cp {} AnyKernel3/ \;
          done
        fi

    - name: Security Verification
      run: |
        # SUSFS模块校验
        wget -q --show-progress -O susfs.zip \
          https://github.com/sidex15/ksu_module_susfs/releases/latest/download/ksu_module_susfs_1.5.2+.zip
        echo "ad3b9c5f2e7a401b  susfs.zip" | sha256sum -c
        unzip -q susfs.zip -d AnyKernel3/

    # ========== 结果上传 ==========
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}_${{ env.KSU_VERSION }}_$(date +%Y%m%d%H%M)
        path: |
          AnyKernel3/*
          ${{ env.KERNEL_DIR }}/out/**/*.img
        retention-days: 7

    # ========== 通知阶段 ==========
    - name: Build Notification
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ job.status }}'
          const message = status === 'success' 
            ? '✅ 构建成功！' 
            : '❌ 构建失败！'
          
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.issue.number,
            body: `### SukiSU Build Result\n${message}\n` +
              `**版本:** ${process.env.KSU_VERSION}\n` +
              `**构建时间:** ${new Date().toISOString()}`
          })
