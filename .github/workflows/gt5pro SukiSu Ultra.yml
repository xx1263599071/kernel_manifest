name: SukiSu Ultra - Realme GT5 Pro (Optimized Build)
on:
  workflow_dispatch:
    inputs:
      CPU_BRANCH:
        description: "处理器分支 (SM8650)"
        required: true
        default: 'sm8650'
      MANIFEST_PROFILE:
        description: "设备配置文件"
        required: true
        default: 'gt5pro'
      SOC_CODENAME:
        description: "SoC代号"
        required: true
        default: 'pineapple'
      ANDROID_VERSION:
        description: "安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      CUSTOM_KERNEL_NAME:
        description: "内核自定义名称"
        required: true
        default: 'SukiSu-Ultra-GT5Pro'
      BUILD_DATE_OVERRIDE:
        description: "构建日期覆盖 (格式: 2024-12-31 23:59:59)"
        required: false
        default: ''
      ENABLE_LZ4KD:
        description: "启用LZ4K深度压缩"
        type: boolean
        default: true
      ENABLE_SCHED_EXT:
        description: "启用风驰调度器"
        type: boolean
        default: false
      ZRAM_CONFIG:
        description: "ZRAM配置方案"
        required: true
        default: 'balanced'
        options: ['performance', 'balanced', 'extreme-compression']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KSU_VERSION: 10606
      ZRAM_SIZE: ${{ contains(github.event.inputs.ZRAM_CONFIG, 'performance') && '2147483648' || '1073741824' }}

    steps:
      # 环境优化
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-web: 'true'

      # CCache 加速
      - name: Setup CCache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/build.config.*') }}
          restore-keys: ${{ runner.os }}-ccache-

      # 构建参数预处理
      - name: Preprocess parameters
        run: |
          # 时间戳处理
          if [ -z "${{ inputs.BUILD_DATE_OVERRIDE }}" ]; then
            echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV
          else
            echo "BUILD_TIMESTAMP=$(date -d "${{ inputs.BUILD_DATE_OVERRIDE }}" +%s)" >> $GITHUB_ENV
          fi

          # 内核名称生成
          echo "FULL_KERNEL_NAME=${{ inputs.CUSTOM_KERNEL_NAME }}-$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          
          # ZRAM参数映射
          case "${{ inputs.ZRAM_CONFIG }}" in
            "performance")
              echo "ZRAM_ALGORITHM=lz4k" >> $GITHUB_ENV
              echo "ZRAM_LEVEL=3" >> $GITHUB_ENV
              ;;
            "balanced")
              echo "ZRAM_ALGORITHM=lz4k" >> $GITHUB_ENV
              echo "ZRAM_LEVEL=6" >> $GITHUB_ENV
              ;;
            "extreme-compression")
              echo "ZRAM_ALGORITHM=zstd" >> $GITHUB_ENV
              echo "ZRAM_LEVEL=12" >> $GITHUB_ENV
              ;;
          esac

      # 仓库初始化
      - name: Initialize repo
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://github.com/xx2901318208/SukiSu_Ultra_Action_Build.git \
            -b realme/${{ inputs.CPU_BRANCH }} \
            -m ${{ inputs.MANIFEST_PROFILE }}.xml \
            --depth=1 \
            --repo-rev=stable

          repo sync -c -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --optimized-fetch

      # LZ4K/ZRAM 优化
      - name: Apply memory optimizations
        run: |
          cd kernel_workspace/kernel_platform

          # 导入压缩算法
          cp -r ../SukiSU_patch/zram/lz4k/include/linux/* ./common/include/linux
          cp -r ../SukiSU_patch/zram/lz4k/lib/* ./common/lib
          cp -r ../SukiSU_patch/zram/lz4k/crypto/* ./common/crypto

          # 配置ZRAM
          sed -i "/CONFIG_ZRAM_DEF_COMP/d" ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_DEF_COMP=${{ env.ZRAM_ALGORITHM }}" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_SIZE_PER_DEVICE=${{ env.ZRAM_SIZE }}" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_DEF_COMP_LEVEL=${{ env.ZRAM_LEVEL }}" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_MULTI_COMP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_WRITEBACK=y" >> ./common/arch/arm64/configs/gki_defconfig

          # 启用LZ4KD
          if ${{ inputs.ENABLE_LZ4KD }}; then
            patch -p1 < ../SukiSU_patch/zram/lz4kd.patch
            echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi

      # 风驰调度器集成
      - name: Integrate sched_ext
        if: ${{ inputs.ENABLE_SCHED_EXT }}
        run: |
          cd kernel_workspace/kernel_platform
          git clone https://github.com/HanKuCha/sched_ext.git -b android-6.1

          # 选择性合并核心代码
          cp sched_ext/core.c ./common/kernel/sched/
          cp sched_ext/bsd.c ./common/kernel/sched/
          cp sched_ext/syscalls.c ./common/kernel/sched/
          cp sched_ext/sched.h ./common/include/linux/

          # 配置调度器
          echo "CONFIG_SCHED_CLASS_EXT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SCHED_DEBUG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SCHED_TRACING=y" >> ./common/arch/arm64/configs/gki_defconfig

      # 内核身份定制
      - name: Customize kernel identity
        run: |
          cd kernel_workspace/kernel_platform
          # 修改版本信息
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${{ env.FULL_KERNEL_NAME }\"/" \
            ./common/arch/arm64/configs/gki_defconfig

          # 清除构建痕迹
          find . -name setlocalversion -exec sed -i '/-dirty/d' {} +
          find . -name Makefile -exec sed -i 's/-dirty//g' {} +

      # 构建内核
      - name: Build kernel with LTO
        run: |
          cd kernel_workspace/kernel_platform
          bazel build \
            --config=stamp \
            --lto=thin \
            --action_env=SOURCE_DATE_EPOCH=${{ env.BUILD_TIMESTAMP }} \
            --remote_cache=grpc://buildcache.sukisu.cn:443 \
            --disk_cache=~/.bazel-cache \
            //common:kernel_aarch64_dist

      # AnyKernel3 打包
      - name: Package with AnyKernel3
        run: |
          cd kernel_workspace/kernel_platform
          git clone https://github.com/Numbersf/AnyKernel3_GT5Pro.git -b sukisu

          # 复制内核镜像
          cp out/msm-kernel-${{ inputs.SOC_CODENAME }}-gki/dist/Image AnyKernel3_GT5Pro/

          # 注入版本信息
          echo "kernel.string=${{ env.FULL_KERNEL_NAME }}" >> AnyKernel3_GT5Pro/version
          echo "build.date=$(date +%Y-%m-%d)" >> AnyKernel3_GT5Pro/version

          # 生成ZIP包
          cd AnyKernel3_GT5Pro
          zip -r9 SukiSu_GT5Pro_${{ env.KSU_VERSION }}_$(date +%Y%m%d).zip *

      # 上传成品
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SukiSu_GT5Pro_${{ env.KSU_VERSION }}
          path: |
            kernel_workspace/kernel_platform/AnyKernel3_GT5Pro/*.zip
            kernel_workspace/kernel_platform/out/**/Image
            
