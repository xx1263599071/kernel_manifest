name: Build Kernel Next-SUSFS For Realme GT5 Pro
on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "处理器分支"
        required: true
        default: 'sm8650'
      MANIFEST:
        description: "配置文件"
        required: true
        default: 'gt5pro'
      CPUD:
        description: "处理器代号"
        required: true
        default: 'pineapple'
      ANDROID_VERSION:
        description: "内核安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      SUSFS_ENABLED:
        description: "添加 SUSFS"
        required: true
        type: boolean
        default: true
      SUSFS_VERSION:
        description: "SUSFS 版本"
        required: true
        default: 'v1.5.5'
      KSU_NEXT_VERSION:
        description: "KernelSU-Next 版本"
        required: true
        default: 'v1.0.5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Config and dependencies
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "KVER=v$(date +%Y%m%d)" >> $GITHUB_ENV
          sudo apt update
          sudo apt install -y \
            python3 git curl \
            flex bison \
            libssl-dev \
            libelf-dev \
            bc \
            rsync
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/xx2901318208/kernel_manifest.git -b realme/${{ github.event.inputs.CPU }} -m ${{ github.event.inputs.MANIFEST }}.xml --depth=1
          repo sync -c -j$(nproc --all) --no-tags --fail-fast
          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"
          sed -i 's|echo "\$res"|echo "-android14-11-o-g1a715a82feea"|' kernel_platform/common/scripts/setlocalversion
          sed -i 's|echo "\$res"|echo "-android14-11-o-g1a715a82feea"|' kernel_platform/msm-kernel/scripts/setlocalversion
          sed -i 's/ -dirty//g' kernel_platform/external/dtc/scripts/setlocalversion
          sed -i 's/SUBLEVEL = 68/SUBLEVEL = 75/' kernel_platform/msm-kernel/Makefile

      # ========== 修复后的 BBRv3 集成 ==========
      - name: Clone BBRv3 (优化版本)
        run: |
          mkdir -p bbr_cache
          cd bbr_cache
          if [ ! -d bbr ]; then
            git clone https://github.com/google/bbr.git -b v3 --depth=200 --no-single-branch
            cd bbr
            git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
            git sparse-checkout init --cone
            git sparse-checkout set net/ipv4/
          else
            cd bbr
            git fetch origin v3 --depth=200
          fi
          git log -n 5 --oneline -- net/ipv4/tcp_bbr*  # 显示最新提交

      - name: Generate BBRv3 patches (修复提交范围)
        run: |
          cd bbr_cache/bbr
          # 查找第一个与 BBR 相关的提交
          FIRST_COMMIT=$(git log --reverse --format=%H -- net/ipv4/tcp_bbr* | head -1)
          if [ -z "$FIRST_COMMIT" ]; then
            echo "::error::未找到 BBR 相关提交！"
            exit 1
          fi
          echo "使用提交范围: ${FIRST_COMMIT}^..HEAD"
          git format-patch -o ../../kernel_workspace/bbr_patches ${FIRST_COMMIT}^..HEAD -- net/ipv4/tcp_bbr*
          echo "生成的补丁列表："
          ls -l ../../kernel_workspace/bbr_patches/*.patch || echo "无补丁生成"

      - name: Apply BBRv3 patches
        run: |
          cd kernel_workspace/kernel_platform/msm-kernel
          for patch in ../../../bbr_patches/*.patch; do
            [ -f "$patch" ] && {
              echo "Applying: $(basename $patch)"
              patch -p1 --no-backup-if-mismatch < "$patch" || echo "Patch may already applied"
            } || echo "Patch not found: $patch"
          done
          git add net/ipv4/tcp_bbr* && git commit -m "BBRv3: Apply official patches" || true

      - name: Configure BBRv3
        run: |
          cd kernel_workspace/kernel_platform/msm-kernel
          find arch/arm64/configs/ -type f \( -name "*defconfig" -o -name "*.config" \) | while read config; do
            echo "Updating $config"
            sed -i '/CONFIG_TCP_CONG_BBR/d;/CONFIG_DEFAULT_TCP_CONG/d' "$config"
            echo -e "\n# BBRv3 Configuration" >> "$config"
            echo "CONFIG_TCP_CONG_BBR=y" >> "$config"
            echo "CONFIG_TCP_CONG_BBR3=y" >> "$config"
            echo "CONFIG_DEFAULT_BBR3=y" >> "$config"
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr3"' >> "$config"
          done
      # ========== BBRv3 集成结束 ==========

      - name: Set up KernelSU Next
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Set up susfs
        if: github.event.inputs.SUSFS_ENABLED == 'true'
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}
          git clone https://github.com/TheWildJames/kernel_patches.git
          cd kernel_platform
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU-Next/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch ./common/
          cp ../kernel_patches/0001-kernel-patch-susfs-${{ github.event.inputs.SUSFS_VERSION }}-to-KernelSU-Next-${{ github.event.inputs.KSU_NEXT_VERSION }}.patch ./KernelSU-Next/
          cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          
          cd ./KernelSU-Next
          patch -p1 < 0001-kernel-patch-susfs-${{ github.event.inputs.SUSFS_VERSION }}-to-KernelSU-Next-${{ github.event.inputs.KSU_NEXT_VERSION }}.patch || true
          cd ../common
          patch -p1 < 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch || true
          cp ../../kernel_patches/69_hide_stuff.patch ./
          patch -p1 -F 3 < 69_hide_stuff.patch
          patch -p1 < ../../.repo/manifests/patches/001-lz4.patch
          patch -p1 < ../../.repo/manifests/patches/002-zstd.patch

      # ========== 构建增强 ==========
      - name: Build kernel (调试模式)
        run: |
          cd kernel_workspace/kernel_platform/msm-kernel
          # 合并配置文件
          ./scripts/kconfig/merge_config.sh -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config
          
          # 启用调试构建
          ./build_with_bazel.py -t ${{ github.event.inputs.CPUD }} gki \
            --verbose_failures \
            --sandbox_debug \
            -o out 2>&1 | tee build.log
          
          # 保存调试日志
          mkdir -p ../../build_logs
          cp build.log ../../build_logs/kernel_build.log
          cp bazel.log ../../build_logs/bazel_debug.log
          cp .config ../../build_logs/kernel.config

      # ========== 容错处理 ==========
      - name: Make AnyKernel3 (增强版)
        run: |
          mkdir -p AnyKernel3
          
          # 尝试多种可能的镜像路径
          find kernel_workspace/kernel_platform/out/dist/ -name "Image*" -exec cp {} AnyKernel3/ \; || true
          
          # 创建占位文件防止完全失败
          if [ -z "$(ls -A AnyKernel3)" ]; then
            echo "构建失败，创建占位文件" > AnyKernel3/build_failed.log
            touch AnyKernel3/FAILED_PLACEHOLDER
          fi
          
          echo "===== 最终文件列表 ====="
          ls -lR AnyKernel3

      # ========== 日志收集 ==========
      - name: Upload debug info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug_${{ github.run_number }}
          path: |
            kernel_workspace/build_logs/kernel_build.log
            kernel_workspace/build_logs/bazel_debug.log
            kernel_workspace/build_logs/kernel.config
          if-no-files-found: error
          retention-days: 7

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AK3_KSU_Next_${{ github.event.inputs.MANIFEST }}_g1a715a82feea
          path: ./AnyKernel3/*
          if-no-files-found: error
          retention-days: 7
